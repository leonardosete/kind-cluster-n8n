name: Aplicar Applications no ArgoCD

on:
  workflow_dispatch:
    inputs:
      executar:
        description: "⚠️ Deseja aplicar os Applications (n8n, postgres) no ArgoCD?"
        required: true
        default: "nao"
        type: choice
        options:
          - sim
          - nao

jobs:
  aplicar-apps:
    if: ${{ github.event.inputs.executar == 'sim' }}
    runs-on: ubuntu-latest

    steps:
    - name: 📦 Checkout do repositório
      uses: actions/checkout@v3

    - name: 🔧 Instala dependências (Ansible + kubectl)
      run: |
        echo "::group::🛠️ Instalando dependências"
        sudo apt-get update
        sudo apt-get install -y ansible sshpass openssh-client curl
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl && sudo mv kubectl /usr/local/bin/
        echo "::endgroup::"

    - name: 🔐 Configura chave SSH da VPS
      run: |
        echo "::group::🔐 Adicionando chave SSH"
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/${{ vars.SSH_KEY_FILENAME }}
        chmod 600 ~/.ssh/${{ vars.SSH_KEY_FILENAME }}
        ssh-keyscan -H ${{ vars.VPS_HOSTNAME }} >> ~/.ssh/known_hosts
        echo "✅ Chave SSH configurada"
        echo "::endgroup::"

    - name: 📁 Cria diretório /root/argo-apps e copia arquivos YAML para VPS
      run: |
        echo "::group::📁 Copiando arquivos argo-apps para a VPS"
        ssh -i ~/.ssh/${{ vars.SSH_KEY_FILENAME }} ${{ vars.VPS_USER }}@${{ vars.VPS_HOSTNAME }} "mkdir -p /root/argo-apps"
        scp -i ~/.ssh/${{ vars.SSH_KEY_FILENAME }} argo-apps/*.yaml ${{ vars.VPS_USER }}@${{ vars.VPS_HOSTNAME }}:/root/argo-apps/
        echo "::endgroup::"

    - name: 🚀 Executa playbook para aplicar Applications do ArgoCD
      working-directory: ./ansible-hostinger
      run: |
        echo "::group::📦 Aplicando applications ArgoCD (somente se ainda não existem)"
        ansible-playbook -i inventory.ini ansible-apply-argo-apps.yml
        echo "::endgroup::"

    - name: ✅ Resultado Final
      run: |
        echo ""
        echo "====================== ✅ APLICAÇÃO FINALIZADA ======================"
        echo ""
        echo "✔️ Os Applications foram verificados e aplicados se necessário."
        echo "🌐 Confira no painel do ArgoCD: https://argocd-test.devops-master.shop"
        echo ""
        echo "====================================================================="
