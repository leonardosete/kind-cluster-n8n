apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.tts-translator.name }}
  namespace: {{ .Values.tts-translator.namespace }}
  annotations:
    {{- with .Values.tts-translator.ingress.annotations }}
    {{ toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.tts-translator.ingress.className }}
  rules:
    - host: {{ .Values.tts-translator.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.tts-translator.name }}
                port:
                  number: {{ .Values.tts-translator.service.port }}
  tls:
    - hosts:
        - {{ .Values.tts-translator.ingress.host }}
      secretName: {{ .Values.tts-translator.ingress.tls.secretName }}
