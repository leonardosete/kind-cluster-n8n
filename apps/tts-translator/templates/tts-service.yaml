apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.tts-translator.name }}
  namespace: {{ .Values.tts-translator.namespace }}
spec:
  selector:
    app: {{ .Values.tts-translator.name }}
  ports:
    - protocol: TCP
      port: {{ .Values.tts-translator.service.port }}
      targetPort: {{ .Values.tts-translator.service.port }}
  type: ClusterIP
