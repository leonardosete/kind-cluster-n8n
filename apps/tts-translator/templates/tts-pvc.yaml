apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.opentts.persistence.pvcName }}
  namespace: {{ .Values.opentts.namespace }}
spec:
  accessModes:
    - {{ .Values.opentts.persistence.accessModes }}
  resources:
    requests:
      storage: {{ .Values.opentts.persistence.storage }}
