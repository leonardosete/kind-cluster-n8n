---
- name: Setup completo do servidor Debian
  hosts: vps_hostinger
  become: yes
  gather_facts: true
  collections:
    - community.general

  vars:
    kind_version: "v0.27.0"
    kind_binary_x86_64: "kind-linux-amd64"
    kind_binary_arm64: "kind-linux-arm64"
    helm_charts_dir: "{{ playbook_dir }}/../helm-charts"

  pre_tasks:
    ###################################################################
    # Passo 1: Setup inicial (apt upgrade, pacotes, Docker, etc.)
    ###################################################################
    - name: Atualiza cache e realiza upgrade de pacotes
      apt:
        update_cache: yes
        upgrade: dist

    - name: Instala pacotes essenciais
      apt:
        name:
          - git
          - docker.io
          - python3
          - python3-pip
          - htop
          - ncdu
          - duf
          - btop
          - mlocate
          - bash-completion
          - openssh-client
          - ufw
          - rsync
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Habilita e inicia serviço Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Instala Docker Compose (binário oficial)
      get_url:
        url: "https://github.com/docker/compose/releases/latest/download/docker-compose-{{ ansible_system|lower }}-{{ ansible_architecture }}"
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    - name: Define MOTD personalizado
      copy:
        dest: /etc/motd
        content: |
          █████████████████████████████████████████████████████████████████
          🚀 Bem-vindo ao servidor Debian (saúde do sistema)

          📌 Comandos úteis para monitoramento:
            → htop
            → btop

          💾 Uso de disco:
            → ncdu /
            → duf

          🔍 Busca de arquivos (mlocate):
            → locate <nome-do-arquivo>
            → updatedb  (atualiza o banco de dados caso algo não apareça)

          🐍 Python:
            → python3 --version
            → pip3 --version
            → pip3 install <pacote>
            → python3 -m venv <nome_da_venv> (criar virtualenv)

          🐳 Docker:
            → docker ps                     # Containers em execução
            → docker ps -a                 # Todos containers
            → docker images                # Imagens disponíveis
            → docker run -it ubuntu bash   # Rodar container Ubuntu
            → docker exec -it <nome|id> bash  # Acessar container rodando
            → docker stop <nome|id>        # Parar container
            → docker rm <nome|id>          # Remover container
            → docker rmi <imagem>          # Remover imagem
            → docker stats                 # Métricas em tempo real
            → docker-compose up -d         # Subir com Compose
            → docker-compose down          # Derrubar stack Compose

          🧹 Limpeza de containers/imagens Docker:
            → docker container prune -f
            → docker image prune -f
            → docker system prune -a --volumes -f  # Limpa geral (⚠️ cuidado!)

          ☸️ Kubernetes (kubectl):
            → kubectl get pods,deployments,services   # listar recursos
            → kubectl create -f <arquivo>.yaml        # criar recurso de um manifest
            → kubectl apply -f <arquivo>.yaml         # atualizar/criar recurso
            → kubectl delete -f <arquivo>.yaml        # remover recurso
            → kubectl describe pod <nome-do-pod>      # detalhes do pod
            → kubectl logs <nome-do-pod>             # logs do pod
            → kubectl exec -it <nome-do-pod> -- bash  # acessar container do pod

          🧠 Info geral:
            → uptime
            → free -h
            → df -h

          📎 Dica:
            → Pressione Ctrl + L para limpar a tela
          █████████████████████████████████████████████████████████████████

    ###################################################################
    # Passo 2: Configura ~/.bashrc - ## DEBIAN ###
    ###################################################################
    - name: Configura ~/.bashrc personalizado (root)
      copy:
        dest: /root/.bashrc
        mode: '0644'
        content: |
          # ~/.bashrc: executed by bash(1) for non-login shells.

          # ------------------------------------------------------------
          # PROMPT E SHELL
          # ------------------------------------------------------------
          if [ -n "$debian_chroot" ]; then
              debian_chroot="($debian_chroot)"
          fi
          PS1='${debian_chroot:+($debian_chroot)}\u@\h:\w\$ '

          export LS_OPTIONS='--color=auto'
          eval "$(dircolors)"

          # ------------------------------------------------------------
          # ALIASES ÚTEIS
          # ------------------------------------------------------------
          alias ls='ls $LS_OPTIONS'
          alias ll='ls -lFh $LS_OPTIONS'
          alias la='ls -lAh $LS_OPTIONS'
          alias l='ls -CF $LS_OPTIONS'

          alias ..='cd ..'
          alias ...='cd ../..'
          alias ....='cd ../../..'

          alias grep='grep --color=auto'
          alias egrep='egrep --color=auto'
          alias f='find . -name'
          alias h='history'

          alias gs='git status'
          alias ga='git add'
          alias gc='git commit'
          alias gp='git push'
          alias gl='git log --oneline --graph --decorate'

          alias rm='rm -i'
          alias cp='cp -i'
          alias mv='mv -i'

          # ------------------------------------------------------------
          # BASH COMPLETION
          # ------------------------------------------------------------
          if [ -f /etc/bash_completion ]; then
              . /etc/bash_completion
          fi

          # Autocomplete do kubectl
          if command -v kubectl &>/dev/null; then
              source <(kubectl completion bash)
          fi

          # ------------------------------------------------------------
          # HISTÓRICO DE COMANDOS
          # ------------------------------------------------------------
          export HISTSIZE=10000
          export HISTFILESIZE=20000
          export HISTCONTROL=ignoreboth
          export PROMPT_COMMAND="history -a; $PROMPT_COMMAND"
          export HISTTIMEFORMAT='%F %T '

          # ------------------------------------------------------------
          # ATIVAÇÃO DE ALIAS E CONFIGURAÇÕES PERSONALIZADAS
          # ------------------------------------------------------------
          if [ -f /etc/bash.bashrc ]; then
              . /etc/bash.bashrc
          fi

    ###################################################################
    # Passo 3: Instalação do KIND
    ###################################################################
    - name: Seleciona binário do KIND de acordo com a arquitetura
      set_fact:
        kind_download_url: >-
          https://kind.sigs.k8s.io/dl/{{ kind_version }}/{{ (kind_binary_x86_64 if ansible_architecture == 'x86_64' else kind_binary_arm64) }}

    - name: Baixa binário do KIND
      get_url:
        url: "{{ kind_download_url }}"
        dest: /usr/local/bin/kind
        mode: '0755'

    - name: Exibe versão do KIND
      command: kind version
      register: kind_version_out
      ignore_errors: true

    - name: Debug - Versão do KIND
      debug:
        msg: "Versão do KIND: {{ kind_version_out.stdout | default('Não foi possível obter') }}"

    ###################################################################
    # Passo 4: Instala e configura kubectl
    ###################################################################
    - name: Adiciona chave GPG do repositório K8s
      apt_key:
        url: https://pkgs.k8s.io/core:/stable:/v1.32/deb/Release.key
        state: present

    - name: Configura repositório do Kubernetes
      apt_repository:
        repo: "deb https://pkgs.k8s.io/core:/stable:/v1.32/deb/ /"
        state: present

    - name: Instala kubectl
      apt:
        name: kubectl
        state: present
        update_cache: yes

    - name: Exibe versão do kubectl (cliente)
      command: kubectl version --client
      register: kubectl_version_out
      ignore_errors: true

    - name: Debug - Versão do kubectl
      debug:
        msg: "kubectl: {{ kubectl_version_out.stdout | default('Não foi possível obter') }}"

    ###################################################################
    # Passo 5: Cria cluster KIND (portas 80, 443 e 6443->42885) + Ingress
    ###################################################################

    - name: Verifica se já existe algum cluster KIND
      command: kind get clusters
      register: clusters_list
      changed_when: false
      ignore_errors: true

    - name: Cria o cluster KIND com portas 80, 443 e 6443->42885 (se não existir)
      shell: |
        cat <<EOF | kind create cluster --config=-
        kind: Cluster
        apiVersion: kind.x-k8s.io/v1alpha4
        nodes:
        - role: control-plane
          extraPortMappings:
          - containerPort: 80
            hostPort: 80
            protocol: TCP
          - containerPort: 443
            hostPort: 443
            protocol: TCP
          - containerPort: 6443
            hostPort: 42885
            protocol: TCP
        EOF
      when: "'kind' not in clusters_list.stdout"

    - name: Libera porta 42885 no firewall UFW
      ufw:
        rule: allow
        port: {{ clusterPort }}
        proto: tcp

    - name: Lista nodes do cluster KIND criado
      command: kubectl get nodes
      register: kind_nodes
      when: "'kind' not in clusters_list.stdout"

    - name: Debug - nós do cluster KIND
      debug:
        msg: "{{ kind_nodes.stdout }}"
      when: "'kind' not in clusters_list.stdout"

    - name: Instala Ingress NGINX no KIND
      command: kubectl apply -f https://kind.sigs.k8s.io/examples/ingress/deploy-ingress-nginx.yaml
      when: "'kind' not in clusters_list.stdout"


    ###################################################################
    # Passo 6: Instalação do Helm
    ###################################################################
    - name: Adiciona chave GPG do Helm
      apt_key:
        url: https://baltocdn.com/helm/signing.asc
        state: present

    - name: Adiciona repositório do Helm
      apt_repository:
        repo: deb https://baltocdn.com/helm/stable/debian/ all main
        state: present

    - name: Atualiza cache de pacotes após adicionar Helm
      apt:
        update_cache: yes

    - name: Instala Helm
      apt:
        name: helm
        state: present

    - name: Verifica versão do Helm
      command: helm version
      register: helm_version_output
      ignore_errors: true

    - name: Debug - Versão do Helm
      debug:
        msg: "Helm instalado: {{ helm_version_output.stdout | default('Não foi possível obter a versão') }}"


    ###################################################################
    # Passo 7: CRIA NAMESPACE n8n-vps
    ###################################################################
    - name: Cria namespace n8n-vps
      command: kubectl create namespace n8n-vps
      register: ns_n8n
      failed_when: ns_n8n.rc not in [0,1]  # se já existir, ignora

    ###################################################################
    # Passo 8: Cria /root/helm-charts no server
    ###################################################################
    - name: Garante que a pasta /root/helm-charts existe no servidor
      file:
        path: /root/helm-charts
        state: directory
        owner: root
        group: root
        mode: '0755'

    ###################################################################
    # Passo 9: Instalação via Helm (cert-bundle) = Cert-Manager + ClusterIssuer - Lets Encrypt
    # Instalação => n8n-postgress e n8n
    ###################################################################

  roles:
    - role: cert_bundle
#    - role: argocd 
    - role: n8n_postgres
    - role: n8n

  post_tasks:
    - name: Exibe URL final do n8n
      debug:
        msg: "Acesse https://{{ n8n_domain_name }} para usar seu n8n!"