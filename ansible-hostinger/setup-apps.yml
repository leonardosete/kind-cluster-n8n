---
- name: Setup Aplicações - KIND Cluster, Cert Manager, n8n
  hosts: vps_hostinger
  become: yes
  gather_facts: false

  tasks:
    - name: Verifica se já existe cluster KIND
      command: kind get clusters
      register: clusters_list
      changed_when: false
      ignore_errors: true

    - name: Cria cluster KIND com portas mapeadas (se necessário)
      shell: |
        cat <<EOF | kind create cluster --config=-
        kind: Cluster
        apiVersion: kind.x-k8s.io/v1alpha4
        nodes:
        - role: control-plane
          extraPortMappings:
          - containerPort: 80
            hostPort: 80
            protocol: TCP
          - containerPort: 443
            hostPort: 443
            protocol: TCP
          - containerPort: 6443
            hostPort: 42885
            protocol: TCP
        EOF
      when: "'kind' not in clusters_list.stdout"

    - name: Libera porta 42885 no UFW
      ufw:
        rule: allow
        port: "42885"
        proto: tcp

    - name: Instala Ingress NGINX no KIND
      command: kubectl apply -f https://kind.sigs.k8s.io/examples/ingress/deploy-ingress-nginx.yaml
      when: "'kind' not in clusters_list.stdout"

    - name: Cria namespace n8n-vps
      command: kubectl create namespace n8n-vps
      register: ns_n8n
      failed_when: ns_n8n.rc not in [0,1]

    - name: Garante existência de diretório de charts
      file:
        path: /root/helm-charts
        state: directory
        mode: '0755'

  roles:
    - role: cert_bundle
    - role: n8n_postgres
    - role: n8n

  post_tasks:
    - name: Exibe URL final do n8n
      debug:
        msg: "Acesse https://{{ n8n_domain_name }} para usar seu n8n!"
